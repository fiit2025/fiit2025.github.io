<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tier List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            background: #050508;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: left;
            margin-bottom: 30px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #2a2a35;
            padding-bottom: 15px;
        }

        /* Tier List - Sharp edges, high contrast */
        .tierlist-container {
            background: #0a0a0f;
            border: 1px solid #333;
            margin-bottom: 60px;
        }

        .tier-row {
            display: flex;
            border-bottom: 1px solid #333;
            min-height: 70px;
        }

        .tier-row:last-child {
            border-bottom: none;
        }

        .tier-label {
            width: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: #000;
            flex-shrink: 0;
            border-right: 1px solid #333;
            text-shadow: none;
        }

        /* Flat tier colors */
        .tier-s { background-color: #ff4d4d; }
        .tier-a { background-color: #ffad33; }
        .tier-b { background-color: #ffd11a; color: #000; }
        .tier-c { background-color: #33cc33; color: #000; }
        .tier-d { background-color: #3399ff; }

        .tier-content {
            flex: 1;
            background: #08080c;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .tier-item {
            background: #15151a;
            border: 1px solid #333;
            padding: 8px 14px;
            cursor: pointer;
            transition: background 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #e0e0e0;
        }

        .tier-item:hover {
            background: #1f1f28;
            border-color: #555;
        }

        .tier-item:active {
            background: #252530;
        }

        .tier-item img {
            width: 28px;
            height: 28px;
            object-fit: cover;
            background: #0a0a0f;
            display: block;
        }

        .tier-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        /* Section Header */
        .section-header {
            margin: 40px 0 20px 0;
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 4px solid #fff;
            padding-left: 15px;
        }

        /* Cards - Sharp, dark, compact */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1px;
            background: #333;
            border: 1px solid #333;
        }

        .object-card {
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            transition: background 0.1s;
        }

        .object-card:hover {
            background: #101018;
        }

        .card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #050508;
            border-bottom: 1px solid #333;
            display: block;
        }

        .card-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            color: #fff;
            line-height: 1.2;
        }

        .tier-badge {
            padding: 4px 10px;
            font-weight: 900;
            font-size: 0.85rem;
            color: #000;
            flex-shrink: 0;
        }

        .card-description {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 20px;
            flex: 1;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #555;
            border-top: 1px solid #222;
            padding-top: 15px;
            font-family: monospace;
        }

        .card-id {
            color: #666;
        }

        /* Empty State */
        .empty-tier {
            color: #444;
            font-style: normal;
            padding: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* No image placeholder */
        .no-image-placeholder {
            width: 100%;
            height: 180px;
            background: #08080c;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .tier-label {
                width: 50px;
                font-size: 1.4rem;
            }
            
            .cards-grid {
                grid-template-columns: 1fr;
            }
            
            .tier-item span {
                max-width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FIIT IS COOKING</h1>
        
        <div class="tierlist-container" id="tierlist">
            <!-- Generated dynamically -->
        </div>

        
        <div class="cards-grid" id="cards-grid">
            <!-- Generated dynamically -->
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const objects = await response.json();
                renderTierlist(objects);
                renderCards(objects);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tierlist').innerHTML = 
                    '<div style="padding: 40px; color: #ff4d4d; text-align: center;">ERROR: data.json not found</div>';
            }
        }

        function renderTierlist(objects) {
            const tiers = ['S', 'A', 'B', 'C', 'D'];
            const container = document.getElementById('tierlist');
            
            tiers.forEach(tier => {
                const tierItems = objects.filter(obj => obj.tier === tier);
                const row = document.createElement('div');
                row.className = 'tier-row';
                
                const content = tierItems.length > 0 
                    ? tierItems.map(obj => `
                        <div class="tier-item" onclick="document.getElementById('card-${obj.id}').scrollIntoView({behavior: 'smooth', block: 'center'})">
                            ${obj.image ? `<img src="${obj.image}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
                            <span>${obj.name}</span>
                        </div>
                    `).join('')
                    : '<span class="empty-tier">— Empty —</span>';
                
                row.innerHTML = `
                    <div class="tier-label tier-${tier.toLowerCase()}">${tier}</div>
                    <div class="tier-content">${content}</div>
                `;
                
                container.appendChild(row);
            });
        }

        function renderCards(objects) {
            const grid = document.getElementById('cards-grid');
            
            objects.forEach(obj => {
                const card = document.createElement('div');
                card.className = 'object-card';
                card.id = `card-${obj.id}`;
                
                const dateStr = `${String(obj.date.day).padStart(2, '0')}.${String(obj.date.month).padStart(2, '0')}.${obj.date.year}`;
                
                const imageHTML = obj.image ? 
                    `<img src="${obj.image}" alt="${obj.name}" class="card-image" loading="lazy" onerror="this.outerHTML='<div class=\'no-image-placeholder\'>No Image</div>'">` : 
                    '<div class="no-image-placeholder">No Image</div>';
                
                card.innerHTML = `
                    ${imageHTML}
                    <div class="card-body">
                        <div class="card-header">
                            <h3 class="card-title">${obj.name}</h3>
                            <span class="tier-badge tier-${obj.tier.toLowerCase()}">${obj.tier}</span>
                        </div>
                        <p class="card-description">${obj.description}</p>
      
                            <span>${dateStr}</span>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
